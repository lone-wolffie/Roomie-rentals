<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Roomie Rentals</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Kenya Rentals</h1>
  <p>Find affordable housing across Kenya</p>
</header>

<section class="filters">
  <input type="text" id="search" placeholder="Search location...">

  <select id="region">
    <option value="">All Regions</option>
    <option value="Nairobi">Nairobi</option>
    <option value="Mombasa">Mombasa</option>
    <option value="Kisumu">Kisumu</option>
  </select>

  <select id="price">
    <option value="">Max Price</option>
    <option value="5000">5,000</option>
    <option value="10000">10,000</option>
    <option value="20000">20,000</option>
  </select>

  <select id="size">
    <option value="">House Size</option>
    <option value="bedsitter">Bedsitter</option>
    <option value="1bedroom">1 Bedroom</option>
    <option value="2bedroom">2 Bedroom</option>
  </select>

  <button onclick="filterListings()">Search</button>
</section>

<section id="listings" class="listings"></section>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Admin Registration Form</title>
</head>
<body>
    <div class="main-container">
        <h2>Admin Registration</h2>
        <div class="registration-container">
            <form id="registration-form">
                <label>Full Name</label>
                <input type="text" id="full-name" placeholder="Please enter your full name" required>
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="Please enter your phone number" required>
                <label>Email</label>
                <input type="text" id="email" placeholder="Please enter your email" required>
                <label>Password</label>
                <input type="password" id="password" placeholder="Please enter your password" required>
                <button type="submit">Register</button>
                <p>Already have an account? <a href="login.html">Login</a></p>

                <p id="error-message" style="color: red;"></p>
            </form>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
